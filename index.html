<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saluran WhatsApp Saya</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    background:linear-gradient(135deg,#25D366,#128C7E);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.card{
    background:#fff;
    width:340px;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}
.logo{
    width:100px;
    height:100px;
    border-radius:50%;
    margin:auto;
    display:block;
    object-fit:cover;
    border:4px solid #25D366;
}
h1{
    margin:15px 0 10px;
    color:#128C7E;
}
p{
    color:#555;
    margin-bottom:20px;
}
.btn{
    display:inline-block;
    text-decoration:none;
    background:#25D366;
    color:#fff;
    padding:14px 28px;
    border-radius:40px;
    font-size:18px;
    transition:.3s;
}
.btn:hover{
    background:#128C7E;
    transform:scale(1.05);
}
footer{
    margin-top:20px;
    font-size:12px;
    color:#888;
}
</style>
</head>

<body>

<div class="card">

<img class="logo" src="logo.png">

<h1>Saluran WhatsApp</h1>

<p>Gabung ke saluran WhatsApp kami untuk mendapatkan informasi terbaru.</p>

<a class="btn" href="https://whatsapp.com/channel/0029Vb8L7LI7YSd0rj2RD11i" target="_blank">
join cuy
</a>

<footer>
© 2026 Saluran WhatsApp
</footer>

</div>

</body>
</html>
